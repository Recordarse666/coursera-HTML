<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1.常见文本标签练习</title>
</head>
<body>
    <!--标题标签-->
    <h2>二级标题标签</h2>
    <h3>三级标题标签</h3>
    <h4>四级标题标签</h4>
    <h5>五级标题标签</h5>
    <h6>六级标题标签</h6>

    <!--段落标签-->
    <p>段落标签</p>
    <p>更改文本样式，
        <strong>字体较粗</strong>,
        <em>斜体</em>,
        <u>下划线</u>,
        <s>删除线</s>
    </p>


    <!--列表标签-->
    <ul>
        <li>无序列表1</li>
        <li>无序列表2</li>
        <li>无序列表3</li>
    </ul>

    <ol>
        <li>有序列表1</li>
        <li>有序列表2</li>
        <li>有序列表3</li>
    </ol>

    <!--表格标签-->
    <h1>Table Row</h1>
    <table border="1"> 
        <!--表头-->
        <tr>
            <th>姓名</th>
            <th>年龄</th>
            <th>性别</th>
        </tr>
        <!--表格内容-->
        <tr>
            <td>张三</td>
            <td>18</td>
            <td>男</td>
        </tr>
        <tr>
            <td>张三</td>
            <td>18</td>
            <td>男</td>
        </tr>
        <tr>
            <td>张三</td>
            <td>18</td>
            <td>男</td>
        </tr>
    </table>
</body>
</html>

<!--适用于大多数HTML的元素的属性：class,id,style-->
