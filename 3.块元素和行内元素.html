<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3.块元素和行内元素</title>
</head>
<body>
    <!--行内元素不能包含块级元素，但可以包含其他的行内元素-->
    <div class="nav">
        <a href="#">链接1</a>
        <a href="#">链接2</a>
        <a href="#">链接2</a>
        <a href="#">链接4</a>
    </div>
    <div class="content">
        <h1>文章内容</h1>
        <p>这是一个段落</p>
        <p>这是一个段落</p>
        <p>这是一个段落</p>
        
    </div>
    <span>这是第一个span标签</span>
    <span>这是第二个span标签</span>
    <span>这是第三个span标签</span>
    <span>这是第四个span标签<a href="#">链接</a></span>
</body>
</html>
