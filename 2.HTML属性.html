<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2.HTML属性</title>
</head>
<body>
    <a href="#">这是一个空连接</a><br>
    <a href="#" target="_blank">在新标签页中打开</a><!-- target="_blank"表示在新标签页中打开链接 -->
    <a href="#" target="_self">在当前标签页中打开</a>
    <a href="#" target="_top">在顶层标签页中打开</a>
    <a href="#" target="_parent">在父标签页中打开</a>
    <hr>
    <img src="cat2.jpg" alt="图片加载失败" width="200">

</body>
</html>
